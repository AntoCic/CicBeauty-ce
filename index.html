        "name": "Carla Ciancimio"

      "sameAs": [
        "https://cncbeauty-ce.web.app/prezzi_faq/"

      "mainEntityOfPage": {

  <!-- favicon -->
  <link rel="icon" type="image/png" href="/img/logo/favicon.png" />
  <!-- title -->
  <title>Cnc Beauty</title>

  <style>
    .starter-loader {
      --starter-loader-color: #000000;
      position: fixed;
      z-index: 999;
      top: 50vh;
      left: 50vw;
      width: 45px;
      height: 40px;
      transform: translate(-50%, -50%);
      background: linear-gradient(#0000 calc(1*100%/6), var(--starter-loader-color) 0 calc(3*100%/6), #0000 0), linear-gradient(#0000 calc(2*100%/6), var(--starter-loader-color) 0 calc(4*100%/6), #0000 0), linear-gradient(#0000 calc(3*100%/6), var(--starter-loader-color) 0 calc(5*100%/6), #0000 0);
      background-size: 10px 400%;
      background-repeat: no-repeat;
      animation: matrix 1s infinite linear;
    }

    @keyframes matrix {
      0% {
        background-position: 0% 100%, 50% 100%, 100% 100%
      }

      100% {
        background-position: 0% 0%, 50% 0%, 100% 0%
      }
    }
  </style>
</head>

<body>
  <div class="starter-loader"></div>
  <noscript>
    <main style="padding:1rem;font-family:Arial,sans-serif;">
      <h1>CNC Beauty - Centro estetico</h1>
      <p>Per consultare trattamenti, prodotti e prezzi è necessario attivare JavaScript.</p>
      <p>Pagine principali: <a href="/prezzi">Prezzi</a>, <a href="/treatments">Trattamenti</a>, <a href="/products">Prodotti</a>.</p>
    </main>
  </noscript>
  <div id="app"></div>
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
