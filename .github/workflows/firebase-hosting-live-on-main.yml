name: Deploy Firebase Hosting live on main
on:
  push:
    branches:
      - main

jobs:
  build_and_deploy_live:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: FirebaseExtended/action-hosting-deploy@v0
        id: deploy
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_CNCBEAUTY_CE }}
          channelId: live
          projectId: cncbeauty-ce
      - name: Notify HubCortex after deploy
        run: npm run notify:release
        env:
          HUBCORTEX_API_KEY: ${{ secrets.HUBCORTEX_API_KEY }}
          DEPLOY_ENV: production
          DEPLOY_ACTOR: ${{ github.actor }}
          DEPLOY_REF_NAME: ${{ github.ref_name }}
          DEPLOY_SHA: ${{ github.sha }}
          DEPLOY_RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          NOTIFY_TYPE_MESSAGE: deploy
          NOTIFY_TITLE: CncBeauty
          NOTIFY_MESSAGE: E stata rilasciata una nuova versione
          NOTIFY_PAYLOAD_JSON: >-
            {"preview":"${{ steps.deploy.outputs.details_url }}"}
      - name: Print deployed URL
        run: |
          echo "Deploy URL: ${{ steps.deploy.outputs.details_url }}" >> "$GITHUB_STEP_SUMMARY"
