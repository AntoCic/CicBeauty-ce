<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex,nofollow" />
    <title>Salva contatto Cnc Beauty</title>
    <meta http-equiv="refresh" content="0;url=/contatto.vcf" />
    <style>
      :root {
        color-scheme: light;
        font-family: Arial, sans-serif;
      }
      body {
        margin: 0;
        min-height: 100svh;
        display: grid;
        place-items: center;
        padding: 1.25rem;
        background: #f7f5f1;
        color: #1f1f1f;
      }
      main {
        width: min(100%, 28rem);
        background: #ffffff;
        border: 1px solid #ded9d0;
        border-radius: 0.75rem;
        padding: 1rem 1.1rem;
      }
      h1 {
        margin: 0 0 0.5rem;
        font-size: 1.1rem;
      }
      p {
        margin: 0.4rem 0;
        line-height: 1.4;
      }
      a {
        color: #7a4f16;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Apertura contatto in corso</h1>
      <p>Se il salvataggio non parte automaticamente, usa il link qui sotto.</p>
      <p><a id="openVcf" href="/contatto.vcf">Apri contatto Cnc Beauty</a></p>
    </main>
    <script>
      (function () {
        var vcfUrl = "/contatto.vcf";
        var link = document.getElementById("openVcf");
        if (link) link.setAttribute("href", vcfUrl);
        window.location.replace(vcfUrl);
      })();
    </script>
  </body>
</html>
